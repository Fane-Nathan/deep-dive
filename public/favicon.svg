<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#041422"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- F monogram -->
  <g fill="url(#letter)">
    <rect x="22" y="14" width="7" height="34" rx="2.5"/>
    <rect x="22" y="14" width="24" height="7" rx="2.5"/>
    <rect x="22" y="29" width="18" height="6" rx="2.5"/>
  </g>

  <!-- surface wave -->
  <path d="M8 53 Q 14 49.5, 20 53 T 32 53 T 44 53 T 56 53"
        fill="none" stroke="#22d3ee" stroke-width="2.4"
        stroke-linecap="round" opacity="0.75"/>

  <!-- rising bubbles -->
  <circle cx="50" cy="26" r="1.6" fill="#a5f3fc" opacity="0.8"/>
  <circle cx="53.5" cy="20" r="1.1" fill="#a5f3fc" opacity="0.55"/>
  <circle cx="51.5" cy="14.5" r="0.8" fill="#a5f3fc" opacity="0.35"/>
</svg>
